<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Heart Glow Mobile First</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #000000;
        color: white;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
      }

      /* واجهة إدخال الاسم - متجاوبة تماماً */
      #input-container {
        text-align: center;
        background: rgba(10, 10, 10, 0.85);
        padding: 30px 20px;
        border-radius: 20px;
        box-shadow: 0 0 40px rgba(255, 20, 147, 0.25);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        z-index: 10;
        width: 85%;
        max-width: 320px;
        box-sizing: border-box;
        transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      }

      h2 {
        font-weight: 300;
        font-size: 1.4rem;
        margin-bottom: 20px;
        color: #fff;
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
      }

      input {
        padding: 12px 18px;
        font-size: 16px;
        border-radius: 30px;
        border: 1.5px solid #ff1493;
        background: #0a0a0a;
        color: white;
        text-align: center;
        margin-bottom: 20px;
        outline: none;
        width: 90%;
        box-sizing: border-box;
        transition: 0.3s;
      }

      input:focus {
        box-shadow: 0 0 20px rgba(255, 20, 147, 0.7);
        background: #000;
      }

      button {
        padding: 12px 30px;
        font-size: 16px;
        background: linear-gradient(45deg, #ff1493, #ff69b4);
        color: white;
        border: none;
        border-radius: 30px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s ease;
        display: block;
        margin: 0 auto;
        width: 80%;
      }

      button:hover {
        transform: scale(1.02);
        box-shadow: 0 0 25px #ff1493;
      }

      .hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        display: none !important;
      }

      /* حاوية الأنيميشن */
      #animation-container {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
      }

      /* النصوص الأنيقة المتجاوبة داخل القلب */
      #text-inside-heart {
        position: absolute;
        text-align: center;
        font-family: 'Georgia', 'Times New Roman', serif;
        z-index: 2;
        pointer-events: none;
        width: 100%;
        padding: 0 10px;
        box-sizing: border-box;
        transform: translateY(-2vh); 
        opacity: 0;
        transition: opacity 2.5s cubic-bezier(0.4, 0, 0.2, 1);
      }

      #displayName {
        font-size: min(7vw, 2.5rem); 
        color: #ffffff;
        font-weight: bold;
        letter-spacing: 4px;
        text-shadow: 0 0 12px rgba(255, 255, 255, 0.7), 0 0 25px rgba(255, 20, 147, 0.9);
        display: block;
        margin-bottom: 8px;
        word-wrap: break-word;
      }

      .sub-text {
        font-size: min(2.5vw, 0.75rem);
        color: #ffb6c1;
        letter-spacing: 5px;
        font-weight: bold;
        text-shadow: 0 0 8px rgba(255, 20, 147, 0.7);
        display: block;
        white-space: nowrap;
      }

      /* التذييل الفخم والسينمائي للموبايل والكمبيوتر */
      .premium-footer {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        font-family: 'Georgia', serif;
        font-size: min(3vw, 0.85rem);
        letter-spacing: 3px;
        color: rgba(255, 255, 255, 0.5);
        text-align: center;
        z-index: 5;
        pointer-events: none;
        white-space: nowrap;
        text-shadow: 0 0 8px rgba(255, 20, 147, 0.3);
        animation: subtlePulse 3s ease-in-out infinite;
      }

      @keyframes subtlePulse {
        0%, 100% { color: rgba(255, 255, 255, 0.4); text-shadow: 0 0 8px rgba(255, 20, 147, 0.2); }
        50% { color: rgba(255, 182, 193, 0.7); text-shadow: 0 0 12px rgba(255, 20, 147, 0.6); }
      }
    </style>
  </head>
  <body>

    <div id="input-container">
      <h2>أدخل الاسم لو سمحت</h2>
      <input type="text" id="userName" placeholder="اكتب الاسم هنا..." maxlength="15" />
      <button onclick="startAnimation()">عرض المفاجأة</button>
    </div>

    <div id="animation-container" class="hidden">
      <canvas id="heartCanvas"></canvas>
      <div id="text-inside-heart">
        <span id="displayName">YOU & ME</span>
        <span class="sub-text">YOU ARE BEAUTIFUL</span>
      </div>
    </div>

    <div class="premium-footer">Designed By Hamza Omar</div>

    <script>
      const canvas = document.getElementById("heartCanvas");
      const ctx = canvas.getContext("2d");

      let stage = "ecg"; 
      let frameCount = 0;
      let ecgProgress = 0;
      const ecgSpeed = 0.009; 
      let heartParticles = [];
      let petals = [];

      const colors = ["#ff0055", "#ff1493", "#ff69b4", "#ff85a2", "#ffffff", "#ff007f"];

      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        if (heartParticles.length > 0 && stage === "heart") {
          updateParticlesScale();
        }
      }
      window.addEventListener("resize", resizeCanvas);

      function startAnimation() {
        const nameInput = document.getElementById("userName").value;
        if (nameInput.trim() === "") {
          alert("فضلاً، اكتب اسماً أولاً!");
          return;
        }

        document.getElementById("displayName").innerText = nameInput.toUpperCase();
        document.getElementById("input-container").classList.add("hidden");
        document.getElementById("animation-container").classList.remove("hidden");

        resizeCanvas();
        initHeartParticles();
        initPetals();
        animate();
      }

      function getHeartPoint(t) {
        return {
          x: 16 * Math.pow(Math.sin(t), 3),
          y: 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)
        };
      }

      function getOptimalScale() {
        return Math.min(canvas.width, canvas.height) / 30; 
      }

      class HeartParticle {
        constructor(angle, isExplosion = false) {
          this.angle = angle;
          this.isExplosion = isExplosion;
          this.reset();
        }

        reset() {
          const baseScale = getOptimalScale();
          const cx = canvas.width / 2;
          const cy = canvas.height / 2 - 20;
          const p = getHeartPoint(this.angle);

          this.targetX = cx + p.x * baseScale;
          this.targetY = cy - p.y * baseScale;

          if (this.isExplosion) {
            this.x = cx - Math.min(canvas.width * 0.15, 100); 
            this.y = cy;
            const angleRand = Math.random() * Math.PI * 2;
            const speedRand = Math.random() * 6 + 3; 
            this.vx = Math.sin(angleRand) * speedRand;
            this.vy = Math.cos(angleRand) * speedRand;
            this.alpha = 1;
            this.decay = Math.random() * 0.025 + 0.015;
            this.size = Math.random() * 2.5 + 1.2;
          } else {
            this.x = this.targetX + (Math.random() - 0.5) * 10;
            this.y = this.targetY + (Math.random() - 0.5) * 10;
            this.vx = (Math.random() - 0.5) * 0.5;
            this.vy = (Math.random() - 0.5) * 0.5;
            this.alpha = Math.random() * 0.6 + 0.4;
            this.decay = Math.random() * 0.015 + 0.003;
            this.size = Math.random() * 2 + 0.8;
          }

          this.color = colors[Math.floor(Math.random() * colors.length)];
        }

        update() {
          if (this.isExplosion) {
            this.x += this.vx;
            this.y += this.vy;
            this.alpha -= this.decay;
            if (this.alpha <= 0) {
              this.isExplosion = false;
              this.reset();
            }
          } else {
            this.x += this.vx;
            this.y += this.vy;
            this.x += (this.targetX - this.x) * 0.06;
            this.y += (this.targetY - this.y) * 0.06;

            this.alpha -= this.decay;
            if (this.alpha <= 0) {
              this.reset();
            }
          }
        }

        draw() {
          ctx.save();
          ctx.globalAlpha = this.alpha;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fillStyle = this.color;
          ctx.shadowBlur = this.isExplosion ? 15 : 10;
          ctx.shadowColor = this.color;
          ctx.fill();
          ctx.restore();
        }
      }

      function initHeartParticles() {
        heartParticles = [];
        for (let i = 0; i < 500; i++) {
          const angle = Math.random() * Math.PI * 2;
          heartParticles.push(new HeartParticle(angle, false));
        }
      }

      function updateParticlesScale() {
        const baseScale = getOptimalScale();
        const cx = canvas.width / 2;
        const cy = canvas.height / 2 - 20;
        heartParticles.forEach(p => {
          const pt = getHeartPoint(p.angle);
          p.targetX = cx + pt.x * baseScale;
          p.targetY = cy - pt.y * baseScale;
        });
      }

      function triggerExplosion() {
        for (let i = 0; i < 180; i++) {
          const angle = Math.random() * Math.PI * 2;
          heartParticles.push(new HeartParticle(angle, true));
        }
      }

      function initPetals() {
        petals = [];
        const count = Math.min(25, canvas.width / 15); 
        for (let i = 0; i < count; i++) {
          petals.push({
            x: Math.random() * canvas.width,
            y: Math.random() * -canvas.height,
            size: Math.random() * 4 + 3,
            speedY: Math.random() * 1.0 + 0.7,
            speedX: Math.random() * 0.6 - 0.3,
            rotation: Math.random() * Math.PI,
            rotSpeed: Math.random() * 0.02 - 0.01
          });
        }
      }

      function drawECGLine(progress) {
        const cx = canvas.width / 2;
        const cy = canvas.height / 2 - 20;
        const eLength = Math.min(canvas.width * 0.85, 500); 
        const startX = cx - eLength / 2;
        const endX = cx + eLength / 2;
        const currentMaxX = startX + (endX - startX) * progress;

        ctx.beginPath();
        ctx.strokeStyle = "#ff1493";
        ctx.lineWidth = 3;
        ctx.shadowBlur = 15;
        ctx.shadowColor = "#ff1493";

        let first = true;
        for (let x = startX; x <= currentMaxX; x += 3) {
          let y = cy;
          let relX = x - (cx - Math.min(eLength * 0.15, 80)); 

          if (relX > -40 && relX < 40) {
            if (relX > -40 && relX < -25) y = cy - (relX + 40) * 1.5;
            else if (relX >= -25 && relX < -10) y = cy + (relX + 25) * 3 - 22;
            else if (relX >= -10 && relX < 0) y = cy - (relX + 10) * 12 + 22;
            else if (relX >= 0 && relX < 15) y = cy + relX * 9 - 180;
            else if (relX >= 15 && relX < 25) y = cy - (relX - 15) * 6 + 135;
            else if (relX >= 25 && relX < 40) y = cy + (relX - 25) * 2.5 - 45;
          }

          if (first) {
            ctx.moveTo(x, y);
            first = false;
          } else {
            ctx.lineTo(x, y);
          }
        }
        ctx.stroke();
      }

      function animate() {
        frameCount++;

        ctx.fillStyle = "rgba(0, 0, 0, 0.14)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (stage === "ecg") {
          ecgProgress += ecgSpeed;
          if (ecgProgress > 1) ecgProgress = 1;
          
          drawECGLine(ecgProgress);

          if (ecgProgress >= 1) {
            stage = "heart";
            triggerExplosion();
            setTimeout(() => {
              document.getElementById("text-inside-heart").style.opacity = "1";
            }, 400);
          }
        }

        if (stage === "heart") {
          let globalPulse = 1 + Math.max(0, Math.sin(frameCount * 0.08) * 0.05);
          const baseScale = getOptimalScale() * globalPulse;
          const cx = canvas.width / 2;
          const cy = canvas.height / 2 - 20;

          heartParticles.forEach(particle => {
            particle.update();
            
            if (!particle.isExplosion) {
              const p = getHeartPoint(particle.angle);
              particle.targetX = cx + p.x * baseScale;
              particle.targetY = cy - p.y * baseScale;
            }
            
            particle.draw();
          });
        }

        petals.forEach(petal => {
          petal.y += petal.speedY;
          petal.x += petal.speedX;
          petal.rotation += petal.rotSpeed;

          if (petal.y > canvas.height) {
            petal.y = -20;
            petal.x = Math.random() * canvas.width;
          }

          ctx.save();
          ctx.translate(petal.x, petal.y);
          ctx.rotate(petal.rotation);
          ctx.beginPath();
          ctx.ellipse(0, 0, petal.size, petal.size * 1.5, 0, 0, Math.PI * 2);
          ctx.fillStyle = "rgba(255, 30, 140, 0.5)"; 
          ctx.shadowBlur = 4;
          ctx.shadowColor = "#ff69b4";
          ctx.fill();
          ctx.restore();
        });

        requestAnimationFrame(animate);
      }
    </script>
  </body>
</html>
